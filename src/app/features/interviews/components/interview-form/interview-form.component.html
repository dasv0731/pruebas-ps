<div class="card">
  <div class="card-header">
    <h2>{{ isEdit ? 'Editar entrevista' : 'Nueva entrevista' }}</h2>
  </div>

  <div *ngIf="loading" class="loading">Cargando...</div>

  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <form *ngIf="!loading" (ngSubmit)="onSubmit()" class="interview-form">
    <div class="form-row">
      <div class="form-group">
        <label for="interviewDate">Fecha de entrevista *</label>
        <input
          id="interviewDate"
          type="date"
          [(ngModel)]="form.interviewDate"
          name="interviewDate"
          required
        />
      </div>
      <div class="form-group">
        <label>Estado</label>
        <span class="badge" [ngClass]="form.status === 'COMPLETED' ? 'badge-active' : 'badge-pending'">
          {{ form.status === 'COMPLETED' ? 'Completada' : 'Borrador' }}
        </span>
      </div>
    </div>

    <div class="form-group full-width">
      <label for="transcript">Transcripción de la entrevista</label>
      <textarea
        id="transcript"
        [(ngModel)]="form.transcript"
        name="transcript"
        rows="18"
        placeholder="Escriba aquí la transcripción completa de la entrevista..."
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="goBack()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        {{ saving ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Guardar borrador') }}
      </button>
      <button
        *ngIf="form.status !== 'COMPLETED'"
        type="button"
        class="btn btn-complete"
        (click)="onSaveAndComplete()"
        [disabled]="saving">
        Guardar y completar
      </button>
    </div>
  </form>
</div>
