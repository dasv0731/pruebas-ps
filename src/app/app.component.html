<div *ngIf="isPublicRoute; else authenticatedLayout">
  <router-outlet></router-outlet>
</div>

<ng-template #authenticatedLayout>
  <amplify-authenticator [hideSignUp]="true">
    <ng-template amplifySlot="header">
      <div style="text-align: center; padding: 20px 0 0 0;">
        <h2>Peritajes Psicológicos</h2>
        <p>Ingrese con sus credenciales</p>
      </div>
    </ng-template>

    <ng-template amplifySlot="authenticated" let-user="user" let-signOut="signOut">
      <div class="app-container">
        <header class="app-header">
          <h1>Peritajes Psicológicos</h1>
          <div class="header-actions">
            <span class="user-email">{{ user?.signInDetails?.loginId }}</span>
            <button class="btn-logout" (click)="signOut()">Cerrar sesión</button>
          </div>
        </header>
        <app-breadcrumb></app-breadcrumb>
        <main class="app-main">
          <router-outlet></router-outlet>
        </main>
      </div>
    </ng-template>
  </amplify-authenticator>
</ng-template>
